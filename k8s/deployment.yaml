apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperature-proxy-api
  namespace: weather
  labels:
    app.kubernetes.io/name: temperature-proxy-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: temperature-proxy-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temperature-proxy-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: temperature-proxy-api
          image: temperature-proxy-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: temperature-proxy-api-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
