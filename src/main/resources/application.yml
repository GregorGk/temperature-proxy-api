spring:
  application:
    name: temperature-proxy-api
  jackson:
    serialization:
      write-dates-as-timestamps: false

weather:
  api:
    base-url: https://api.open-meteo.com
    connect-timeout-ms: 1000
    read-timeout-ms: 1000
    cache-ttl-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      openMeteo:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          seconds: 30
        slow-call-duration-threshold:
          seconds: 1
        slow-call-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  info:
    title: Temperature Proxy API
    description: Proxies current weather data from Open-Meteo with caching and circuit breaking
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,caches
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  main:
    banner-mode: off
